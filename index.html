<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>YouTubeリピート再生</title>
  <link rel="stylesheet" href="css/style.css" type="text/css">
  <link rel="icon" href="icon/logo.ico">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=pause,delete,stop" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <script src="js/analytics.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div id="controls">
    <div class="input-wrapper">
      <input type="text" id="youtubeUrl" class="input_1" placeholder="YouTube動画のURLを入力" autocomplete="off">
      <div id="historyPanel" class="hidden">
        <ul id="historyList"></ul>
        <div id="historyTabs">
          <button type="button" class="history-tab active" data-tab="solo">solo</button>
          <button type="button" class="history-tab" data-tab="list">list</button>
        </div>
      </div>
    </div>
    <button id="playButton" class="btn_10 icon-btn" aria-label="再生">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <path fill="currentColor" d="M8,5v14l11,-7z" />
      </svg>
    </button>
    <button id="settingsButton" class="btn_10 icon-btn" aria-label="設定">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path fill="currentColor" d="M19.14,12.94c0.04,-0.3 0.06,-0.61 0.06,-0.94c0,-0.32 -0.02,-0.64 -0.07,-0.94l2.03,-1.58c0.18,-0.14 0.23,-0.41 0.12,-0.61l-1.92,-3.32c-0.12,-0.22 -0.37,-0.29 -0.59,-0.22l-2.39,0.96c-0.5,-0.38 -1.03,-0.7 -1.62,-0.94L14.4,2.81c-0.04,-0.24 -0.24,-0.41 -0.48,-0.41h-3.84c-0.24,0 -0.43,0.17 -0.47,0.41L9.25,5.35C8.66,5.59 8.12,5.92 7.63,6.29L5.24,5.33c-0.22,-0.08 -0.47,0 -0.59,0.22L2.74,8.87C2.62,9.08 2.66,9.34 2.86,9.48l2.03,1.58C4.84,11.36 4.8,11.69 4.8,12s0.02,0.64 0.07,0.94l-2.03,1.58c-0.18,0.14 -0.23,0.41 -0.12,0.61l1.92,3.32c0.12,0.22 0.37,0.29 0.59,0.22l2.39,-0.96c0.5,0.38 1.03,0.7 1.62,0.94l0.36,2.54c0.05,0.24 0.24,0.41 0.48,0.41h3.84c0.24,0 0.44,-0.17 0.47,-0.41l0.36,-2.54c0.59,-0.24 1.13,-0.56 1.62,-0.94l2.39,0.96c0.22,0.08 0.47,0 0.59,-0.22l1.92,-3.32c0.12,-0.22 0.07,-0.47 -0.12,-0.61L19.14,12.94z M12,15.6c-1.98,0 -3.6,-1.62 -3.6,-3.6s1.62,-3.6 3.6,-3.6s3.6,1.62 3.6,3.6S13.98,15.6 12,15.6z" />
      </svg>
    </button>
    <button id="pauseButton" class="btn_10 icon-btn hidden"><span class="material-symbols-outlined">pause</span></button>
    <button id="stopButton" class="btn_10 icon-btn hidden">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <rect x="5" y="5" width="14" height="14" rx="2" ry="2" fill="currentColor" />
      </svg>
    </button>
  </div>

  <div id="player"></div>

  <div id="settingsPanel" class="hidden modal-overlay">
    <div id="settingsBackdrop" class="modal-backdrop"></div>
    <div id="settingsDialog" class="modal-dialog">
      <div class="modal-header">
        <span>設定</span>
        <button type="button" id="settingsClose" class="modal-close">×</button>
      </div>
      <div id="settingsBody">
        <div id="syncBar">
          <span id="syncStatus">未ログイン</span>
          <button type="button" id="authButton">Googleでログイン</button>
        </div>
        <button type="button" id="importPlaylistButton" class="settings-action">プレイリストをインポート</button>
      </div>
    </div>
  </div>

  <div id="playlistImportPanel" class="hidden modal-overlay">
    <div id="playlistImportBackdrop" class="modal-backdrop"></div>
    <div id="playlistImportDialog" class="modal-dialog">
      <div class="modal-header">
        <span>プレイリストを選択</span>
        <button type="button" id="playlistImportClose" class="modal-close">×</button>
      </div>
      <div id="playlistImportStatus"></div>
      <ul id="playlistImportList"></ul>
    </div>
  </div>

  <script type="module" src="js/history-ui.js"></script>
  <script type="module" src="js/player.js"></script>
  <script type="module" src="js/drive-sync.js"></script>
  <script type="module" src="js/playlist-import.js"></script>
  <script type="module" src="js/settings-panel.js"></script>
  <script type="module" src="js/stall-recovery.js"></script>
</body>

</html>
